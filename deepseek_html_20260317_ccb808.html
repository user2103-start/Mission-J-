<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>missionjeet · glass stream</title>
  <!-- HLS.js for streaming -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
      background-size: cover;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1rem;
    }

    /* main glass container */
    .glass-app {
      width: 100%;
      max-width: 1440px;
      background: rgba(18, 22, 30, 0.45);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 2.5rem;
      padding: 2rem 1.8rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* nav bar */
    .nav-glass {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      background: rgba(10, 15, 25, 0.5);
      padding: 0.5rem;
      border-radius: 3rem;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: rgba(240, 245, 255, 0.6);
      font-weight: 600;
      font-size: 1.1rem;
      padding: 0.7rem 1.8rem;
      border-radius: 2.5rem;
      cursor: pointer;
      transition: 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .nav-btn.active {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 215, 100, 0.3);
    }

    .nav-btn:hover {
      color: white;
      background: rgba(255, 255, 255, 0.1);
    }

    /* search */
    .search-wrapper {
      display: flex;
      align-items: center;
      background: rgba(20, 28, 40, 0.6);
      border-radius: 3rem;
      padding: 0.3rem 0.3rem 0.3rem 1.5rem;
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 215, 140, 0.15);
      flex: 1 1 250px;
      max-width: 360px;
    }

    .search-wrapper i {
      color: rgba(230, 230, 250, 0.7);
      font-size: 1rem;
    }

    #searchInput {
      background: transparent;
      border: none;
      padding: 0.8rem 1rem;
      color: white;
      font-size: 1rem;
      width: 100%;
      outline: none;
    }

    #searchInput::placeholder {
      color: rgba(200, 210, 240, 0.5);
    }

    .search-btn {
      background: rgba(230, 210, 255, 0.1);
      border: none;
      color: white;
      padding: 0.6rem 1.3rem;
      border-radius: 3rem;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,240,0.1);
    }

    .search-btn:hover {
      background: rgba(255, 235, 200, 0.25);
    }

    /* banner */
    .banner-section {
      margin-bottom: 2.8rem;
      border-radius: 2.2rem;
      overflow: hidden;
      box-shadow: 0 25px 40px -10px black;
      background: rgba(0,0,0,0.2);
    }

    .course-banner-img {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      display: block;
      opacity: 0.9;
    }

    /* lecture grid */
    .lecture-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem 1rem;
      margin: 1.8rem 0 2rem;
      min-height: 400px;
    }

    @media (min-width: 900px) {
      .lecture-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* glass card */
    .lecture-card {
      background: rgba(25, 30, 40, 0.5);
      backdrop-filter: blur(16px);
      border-radius: 2rem;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 0 18px 30px -12px rgba(0, 0, 0, 0.7);
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      cursor: pointer;
    }

    .lecture-card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 30px 50px -15px black, 0 0 0 1px rgba(255, 215, 140, 0.4);
      background: rgba(35, 42, 58, 0.7);
    }

    .thumbnail-wrapper {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      background: #0f1219;
    }

    .thumbnail-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }

    .lecture-card:hover .thumbnail-wrapper img {
      transform: scale(1.1);
    }

    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 20, 28, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.25s;
      backdrop-filter: blur(2px);
    }

    .lecture-card:hover .play-overlay {
      opacity: 1;
    }

    .play-overlay i {
      font-size: 3.5rem;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 0 30px #ffd78c;
    }

    .card-content {
      padding: 0.9rem 1rem 1rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,210,120,0.1);
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 500;
      color: #f0f4ff;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .duration-badge {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      padding: 0.25rem 0.7rem;
      border-radius: 30px;
      font-size: 0.75rem;
      color: #cfd9ff;
      border: 1px solid rgba(255, 245, 190, 0.2);
      white-space: nowrap;
      margin-left: 8px;
    }

    /* loading spinner */
    .spinner {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4rem 2rem;
      grid-column: 1 / -1;
      color: white;
    }

    .spinner i {
      font-size: 3rem;
      animation: spin 1s infinite linear;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-message {
      grid-column: 1/-1;
      text-align: center;
      padding: 3rem;
      background: rgba(0,0,0,0.5);
      border-radius: 2rem;
      color: #ffaa66;
    }

    .retry-btn {
      background: rgba(255,200,120,0.2);
      border: 1px solid rgba(255,200,100,0.5);
      color: white;
      padding: 0.8rem 2rem;
      border-radius: 2rem;
      margin-top: 1rem;
      cursor: pointer;
    }

    /* modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(8, 12, 18, 0.8);
      backdrop-filter: blur(24px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1.5rem;
    }

    .modal-card {
      background: rgba(16, 22, 32, 0.7);
      backdrop-filter: blur(32px);
      border-radius: 3rem;
      padding: 1.8rem;
      max-width: 950px;
      width: 100%;
      border: 1px solid rgba(255,210,130,0.2);
      animation: fadeSlide 0.3s ease;
    }

    @keyframes fadeSlide {
      0% { opacity: 0.4; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1); }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      color: white;
    }

    .modal-header h3 {
      font-size: 1.4rem;
      max-width: 80%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .close-modal {
      background: rgba(255,255,255,0.05);
      border: none;
      color: #ddd;
      font-size: 2.2rem;
      cursor: pointer;
      padding: 0.2rem 1rem;
      border-radius: 4rem;
      transition: 0.2s;
    }

    .close-modal:hover {
      background: rgba(255,70,70,0.2);
    }

    .video-wrapper {
      border-radius: 2rem;
      overflow: hidden;
      background: black;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    #videoPlayer {
      width: 100%;
      display: block;
      aspect-ratio: 16/9;
      background: black;
    }

    footer {
      margin-top: 2rem;
      text-align: center;
      color: rgba(240,245,255,0.4);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
<div class="glass-app">
  
  <!-- NAVIGATION -->
  <div class="nav-glass">
    <div class="nav-links">
      <button class="nav-btn active" id="jeeNavBtn">JEE</button>
      <button class="nav-btn" id="neetNavBtn">NEET</button>
    </div>
    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search lectures...">
      <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i></button>
    </div>
  </div>

  <!-- BANNER -->
  <div class="banner-section">
    <img class="course-banner-img" id="bannerImage" src="https://dxixtlyravvxx.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/7261523_131_drona%20jee%20banner%20app.jpg" alt="banner">
  </div>

  <!-- LECTURE GRID -->
  <div id="lectureContainer" class="lecture-grid">
    <div class="spinner">
      <i class="fas fa-circle-notch"></i>
      <p>Loading lectures...</p>
    </div>
  </div>

  <footer>⚡ missionjeet · glass stream</footer>

  <!-- VIDEO MODAL -->
  <div id="videoModal" class="modal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="modalTitle">Lecture</h3>
        <button class="close-modal" id="closeModalBtn">&times;</button>
      </div>
      <div class="video-wrapper">
        <video id="videoPlayer" controls playsinline></video>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  // ========== CONFIG ==========
  const BANNERS = {
    jee: 'https://dxixtlyravvxx.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/7261523_131_drona%20jee%20banner%20app.jpg',
    neet: 'https://dxixtlyravvxx.cloudfront.net/1772100600/admin_v2/thumbnails//147818_131_drona%20neet%20banner%20website.jpg'
  };

  // ========== STATE ==========
  let currentCourse = '151'; // 151 = JEE, 152 = NEET
  let allLectures = [];
  let filteredLectures = [];
  let isLoading = false;
  let retryCount = 0;

  // ========== DOM ELEMENTS ==========
  const bannerImg = document.getElementById('bannerImage');
  const lectureDiv = document.getElementById('lectureContainer');
  const jeeBtn = document.getElementById('jeeNavBtn');
  const neetBtn = document.getElementById('neetNavBtn');
  const searchInput = document.getElementById('searchInput');
  const searchBtn = document.getElementById('searchBtn');
  const modal = document.getElementById('videoModal');
  const modalTitle = document.getElementById('modalTitle');
  const videoPlayer = document.getElementById('videoPlayer');
  const closeModal = document.getElementById('closeModalBtn');

  // ========== API CALL WITH RETRY ==========
  async function fetchWithTimeout(resource, options = {}) {
    const { timeout = 8000 } = options;
    
    const controller = new AbortController();
    const id = setTimeout(() => controller.abort(), timeout);
    
    try {
      const response = await fetch(resource, {
        ...options,
        signal: controller.signal
      });
      clearTimeout(id);
      return response;
    } catch (error) {
      clearTimeout(id);
      throw error;
    }
  }

  async function fetchLectures(courseId, retry = true) {
    if (isLoading) return;
    
    isLoading = true;
    showLoading();
    
    try {
      // Try to fetch from API first
      let lectures = [];
      
      try {
        const response = await fetchWithTimeout(
          `https://apiserver-jwex.onrender.com/api/missionjeet/all-content/${courseId}`,
          { timeout: 5000 }
        );
        
        if (!response.ok) throw new Error('API response not ok');
        
        const data = await response.json();
        lectures = (data.data || [])
          .filter(item => item && item.type === 'file')
          .map(item => ({
            title: item.title || 'Untitled',
            thumbnail: item.thumbnail || getDefaultThumbnail(),
            file_url: item.file_url || '',
            duration: item.duration || '--:--'
          }));
          
      } catch (apiError) {
        console.log('API fetch failed, using fallback data:', apiError);
        
        // Fallback data agar API fail ho jaye
        lectures = getFallbackLectures(courseId);
        
        // Agar retry enabled hai to dikhao retry button
        if (retry && retryCount < 2) {
          showErrorWithRetry(courseId);
          return;
        }
      }
      
      // Success - reset retry count
      retryCount = 0;
      
      // Agar lectures mil gaye to update karo
      if (lectures.length > 0) {
        allLectures = lectures;
        filteredLectures = [...lectures];
        renderLectures(filteredLectures);
      } else {
        showNoLectures();
      }
      
    } catch (error) {
      console.error('Fatal error:', error);
      showErrorWithRetry(courseId);
    } finally {
      isLoading = false;
    }
  }

  // ========== FALLBACK DATA ==========
  function getFallbackLectures(courseId) {
    if (courseId === '151') { // JEE
      return [
        {
          title: "JEE Main 2024: Quadratic Equations",
          thumbnail: "https://img.youtube.com/vi/6yOqMqzrFpA/maxresdefault.jpg",
          file_url: "https://d3s9x0i2d9s2k8.cloudfront.net/videos/jee_quadratic.mp4",
          duration: "45:20"
        },
        {
          title: "JEE Advanced: Complex Numbers",
          thumbnail: "https://img.youtube.com/vi/2QX7M7Wv9Lk/maxresdefault.jpg",
          file_url: "https://d3s9x0i2d9s2k8.cloudfront.net/videos/jee_complex.mp4",
          duration: "52:15"
        },
        {
          title: "Physics: Electrostatics",
          thumbnail: "https://img.youtube.com/vi/Nqz9qJIgR_w/maxresdefault.jpg",
          file_url: "https://d3s9x0i2d9s2k8.cloudfront.net/videos/jee_electrostatics.mp4",
          duration: "38:45"
        },
        {
          title: "Organic Chemistry: GOC",
          thumbnail: "https://img.youtube.com/vi/cP9CnykM8YQ/maxresdefault.jpg",
          file_url: "https://d3s9x0i2d9s2k8.cloudfront.net/videos/jee_goc.mp4",
          duration: "41:30"
        }
      ];
    } else { // NEET
      return [
        {
          title: "NEET Biology: Cell Cycle",
          thumbnail: "https://img.youtube.com/vi/qT7-JvRz8K0/maxresdefault.jpg",
          file_url: "https://d3s9x0i2d9s2k8.cloudfront.net/videos/neet_cell_cycle.mp4",
          duration: "42:10"
        },
        {
          title: "Physics: Modern Physics",
          thumbnail: "https://img.youtube.com/vi/L1g9W0mC4jk/maxresdefault.jpg",
          file_url: "https://d3s9x0i2d9s2k8.cloudfront.net/videos/neet_modern_physics.mp4",
          duration: "51:25"
        },
        {
          title: "Organic Chemistry: Hydrocarbons",
          thumbnail: "https://img.youtube.com/vi/qDpBeWPHHZk/maxresdefault.jpg",
          file_url: "https://d3s9x0i2d9s2k8.cloudfront.net/videos/neet_hydrocarbons.mp4",
          duration: "47:30"
        }
      ];
    }
  }

  function getDefaultThumbnail() {
    return 'https://via.placeholder.com/320x180/1e2533/9aa9c7?text=lecture';
  }

  // ========== UI FUNCTIONS ==========
  function showLoading() {
    lectureDiv.innerHTML = `
      <div class="spinner">
        <i class="fas fa-circle-notch"></i>
        <p>Loading lectures...</p>
      </div>
    `;
  }

  function showErrorWithRetry(courseId) {
    retryCount++;
    lectureDiv.innerHTML = `
      <div class="error-message">
        <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 1rem;"></i>
        <p>Unable to load lectures. Please check your connection.</p>
        <button class="retry-btn" onclick="window.retryFetch('${courseId}')">
          <i class="fas fa-redo-alt"></i> Retry
        </button>
      </div>
    `;
  }

  function showNoLectures() {
    lectureDiv.innerHTML = `
      <div class="error-message">
        <i class="fas fa-video-slash"></i>
        <p>No lectures available for this course.</p>
      </div>
    `;
  }

  function renderLectures(lectures) {
    if (!lectures || lectures.length === 0) {
      lectureDiv.innerHTML = `
        <div class="error-message">
          <i class="fas fa-search"></i>
          <p>No matching lectures found</p>
        </div>
      `;
      return;
    }

    let html = '';
    lectures.forEach(lec => {
      html += `
        <div class="lecture-card" data-video-url="${lec.file_url}" data-title="${lec.title.replace(/"/g, '&quot;')}">
          <div class="thumbnail-wrapper">
            <img src="${lec.thumbnail}" alt="thumb" loading="lazy" onerror="this.src='${getDefaultThumbnail()}'">
            <div class="play-overlay"><i class="fas fa-play-circle"></i></div>
          </div>
          <div class="card-content">
            <span class="card-title">${lec.title}</span>
            <span class="duration-badge"><i class="far fa-clock"></i> ${lec.duration}</span>
          </div>
        </div>
      `;
    });
    
    lectureDiv.innerHTML = html;

    // Add click handlers
    document.querySelectorAll('.lecture-card').forEach(card => {
      card.addEventListener('click', () => {
        const url = card.dataset.videoUrl;
        const title = card.dataset.title;
        if (url) {
          openVideoModal(url, title);
        } else {
          alert('Video URL not available');
        }
      });
    });
  }

  // ========== VIDEO PLAYER ==========
  function openVideoModal(videoUrl, title) {
    modalTitle.innerText = title || 'Lecture';
    
    // Clean up previous HLS instance
    if (window._currentHls) {
      window._currentHls.destroy();
      window._currentHls = null;
    }
    
    videoPlayer.pause();
    videoPlayer.removeAttribute('src');
    
    // Try to play the video
    if (videoUrl) {
      // Check if it's an HLS stream
      if (videoUrl.includes('.m3u8')) {
        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(videoUrl);
          hls.attachMedia(videoPlayer);
          window._currentHls = hls;
        } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
          videoPlayer.src = videoUrl;
        } else {
          videoPlayer.src = videoUrl; // Fallback
        }
      } else {
        // Regular MP4 video
        videoPlayer.src = videoUrl;
      }
    }
    
    modal.style.display = 'flex';
  }

  function closeVideoModal() {
    modal.style.display = 'none';
    videoPlayer.pause();
    if (window._currentHls) {
      window._currentHls.destroy();
      window._currentHls = null;
    }
    videoPlayer.removeAttribute('src');
  }

  // ========== SEARCH ==========
  function filterLectures() {
    if (!allLectures.length) return;
    
    const term = searchInput.value.trim().toLowerCase();
    if (!term) {
      filteredLectures = [...allLectures];
    } else {
      filteredLectures = allLectures.filter(l => 
        l.title.toLowerCase().includes(term)
      );
    }
    renderLectures(filteredLectures);
  }

  // ========== COURSE SWITCH ==========
  function switchCourse(courseId) {
    currentCourse = courseId;
    
    // Update active button
    jeeBtn.classList.toggle('active', courseId === '151');
    neetBtn.classList.toggle('active', courseId === '152');
    
    // Update banner
    bannerImg.src = courseId === '151' ? BANNERS.jee : BANNERS.neet;
    
    // Clear search
    searchInput.value = '';
    
    // Fetch lectures
    retryCount = 0;
    fetchLectures(courseId);
  }

  // ========== GLOBAL RETRY FUNCTION ==========
  window.retryFetch = function(courseId) {
    fetchLectures(courseId, true);
  };

  // ========== EVENT LISTENERS ==========
  jeeBtn.addEventListener('click', () => switchCourse('151'));
  neetBtn.addEventListener('click', () => switchCourse('152'));
  
  searchBtn.addEventListener('click', filterLectures);
  searchInput.addEventListener('keyup', (e) => {
    if (e.key === 'Enter') filterLectures();
  });
  
  closeModal.addEventListener('click', closeVideoModal);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeVideoModal();
  });
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.style.display === 'flex') {
      closeVideoModal();
    }
  });

  // ========== INITIALIZE ==========
  // Pehle banner set karo
  bannerImg.src = BANNERS.jee;
  bannerImg.onerror = () => {
    bannerImg.src = 'https://via.placeholder.com/1200x200/1a1f2e/6b7c9f?text=JEE';
  };
  
  // Phir lectures fetch karo
  fetchLectures('151');

  // Optional: Batch details fetch for future use
  fetch('https://apiserver-jwex.onrender.com/api/missionjeet/batches')
    .then(res => res.json())
    .then(data => console.log('Batches:', data))
    .catch(() => {});
})();
</script>
</body>
</html>
