<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream Pro Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00e5ff; --bg: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: white; min-height: 100vh; background-image: linear-gradient(to bottom, #1e293b, #0f172a); }
        
        header { padding: 20px; text-align: center; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); sticky; top: 0; z-index: 10; }
        .tabs { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        .tab-btn { padding: 10px 25px; border: none; border-radius: 8px; background: #334155; color: white; cursor: pointer; }
        .tab-btn.active { background: var(--accent); color: #000; font-weight: bold; }

        main { padding: 15px; }
        .banner { width: 100%; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }

        .card { background: rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; }
        .play-btn { position: absolute; inset: 0; display: flex; items-center; justify-content: center; background: rgba(0,0,0,0.3); font-size: 30px; }
        
        .info { padding: 10px; }
        .info h4 { font-size: 13px; height: 36px; overflow: hidden; margin-bottom: 5px; }
        .info span { font-size: 11px; color: var(--accent); }

        .modal { position: fixed; inset: 0; background: #000; display: none; z-index: 100; flex-direction: column; }
        video { width: 100%; height: 80vh; background: #000; }
        .close-vid { padding: 20px; text-align: right; font-size: 25px; cursor: pointer; }

        #loader { display: none; text-align: center; padding: 40px; color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1 style="color: var(--accent)">EduStream</h1>
    <div class="tabs">
        <button class="tab-btn active" id="btn-JEE" onclick="load('JEE')">JEE</button>
        <button class="tab-btn" id="btn-NEET" onclick="load('NEET')">NEET</button>
    </div>
</header>

<main>
    <img id="banner" class="banner" src="">
    <div id="loader"><i class="fas fa-spinner fa-spin"></i> Loading...</div>
    <div id="grid" class="grid"></div>
</main>

<div id="modal" class="modal">
    <div class="close-vid" onclick="closePlayer()">&times; Close</div>
    <video id="player" controls autoplay></video>
</div>

<script>
    const CONFIG = {
        JEE: { api: "https://apiserver-jwex.onrender.com/api/missionjeet/all-content/151", banner: "https://dxixtlyravvxx.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/7261523_131_drona%20jee%20banner%20app.jpg" },
        NEET: { api: "https://apiserver-jwex.onrender.com/api/missionjeet/all-content/152", banner: "https://dxixtlyravvxx.cloudfront.net/1772100600/admin_v2/thumbnails//147818_131_drona%20neet%20banner%20website.jpg" }
    };

    // Proxy to bypass CORs and Referer blocks
    const PROXY = "https://api.allorigins.win/raw?url=";
    let hls = null;

    async function load(type) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+type).classList.add('active');
        document.getElementById('banner').src = CONFIG[type].banner;
        
        const grid = document.getElementById('grid');
        const loader = document.getElementById('loader');
        
        grid.innerHTML = '';
        loader.style.display = 'block';

        try {
            // Fetch using proxy to avoid CORS/Headers issues
            const res = await fetch(PROXY + encodeURIComponent(CONFIG[type].api));
            const json = await res.json();
            const files = json.data.filter(i => i.type === 'file');
            
            grid.innerHTML = files.map(item => `
                <div class="card" onclick="playVid('${item.file_url}')">
                    <div class="thumb">
                        <img src="${item.thumbnail}" onerror="this.src='https://via.placeholder.com/300x170/000/fff?text=No+Thumbnail'">
                        <div class="play-btn"><i class="fas fa-play-circle"></i></div>
                    </div>
                    <div class="info">
                        <h4>${item.title}</h4>
                        <span><i class="fas fa-clock"></i> ${Math.floor(item.duration/60)} mins</span>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            grid.innerHTML = "<p>Failed to load data. API might be down.</p>";
        } finally {
            loader.style.display = 'none';
        }
    }

    function playVid(url) {
        const modal = document.getElementById('modal');
        const video = document.getElementById('player');
        modal.style.display = 'flex';

        if (Hls.isSupported()) {
            if (hls) hls.destroy();
            hls = new Hls({
                xhrSetup: function (xhr) {
                    xhr.withCredentials = false; // Helps with some restricted streams
                }
            });
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            
            // Error handling for the player
            hls.on(Hls.Events.ERROR, function (event, data) {
                if (data.fatal) {
                    console.error("HLS Fatal Error:", data.type);
                    alert("This video format is restricted or cannot be played on this device.");
                }
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.play();
        }
    }

    function closePlayer() {
        const video = document.getElementById('player');
        document.getElementById('modal').style.display = 'none';
        video.pause();
        if(hls) hls.stopLoad();
    }

    // Start
    load('JEE');
</script>

</body>
</html>
