<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduStream Extreme</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00ffcc; --bg: #05070a; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; }
        header { padding: 15px; text-align: center; background: #0d1117; border-bottom: 1px solid #30363d; position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 5px; font-weight: 600; }
        .nav-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        
        main { padding: 15px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        
        .card { background: #161b22; border-radius: 8px; overflow: hidden; border: 1px solid #30363d; cursor: pointer; position: relative; }
        .thumb { width: 100%; aspect-ratio: 16/9; background: #000; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .info { padding: 10px; font-size: 12px; font-weight: 500; text-align: center; }

        /* Fullscreen Player */
        .modal { position: fixed; inset: 0; background: #000; z-index: 1000; display: none; flex-direction: column; }
        .modal-header { padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #161b22; }
        .video-js { width: 100% !important; height: calc(100vh - 50px) !important; }
        #loading-txt { text-align: center; margin-top: 50px; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h2 style="color: var(--accent); font-size: 1.2rem;">MISSION J PRO</h2>
    <div class="nav">
        <button class="nav-btn active" id="btn-JEE" onclick="load('JEE')">JEE BATCH</button>
        <button class="nav-btn" id="btn-NEET" onclick="load('NEET')">NEET BATCH</button>
    </div>
</header>

<main>
    <div id="loading-txt">Optimizing Stream...</div>
    <div id="grid" class="grid"></div>
</main>

<div id="modal" class="modal">
    <div class="modal-header">
        <span id="v-title" style="font-size: 12px;">Streaming...</span>
        <button onclick="closePlayer()" style="background:#da3633; color:white; border:none; padding:5px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">EXIT</button>
    </div>
    <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" playsinline></video>
</div>

<script>
    const CONFIG = {
        JEE: "https://apiserver-jwex.onrender.com/api/missionjeet/all-content/151",
        NEET: "https://apiserver-jwex.onrender.com/api/missionjeet/all-content/152"
    };

    const PROXY = "https://api.allorigins.win/raw?url=";
    let player = videojs('my-video', {
        fluid: true,
        playbackRates: [0.5, 1, 1.5, 2],
        html5: { hls: { overrideNative: true, enableLowInitialPlaylist: true, smoothQualityChange: true } }
    });

    async function load(type) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${type}`).classList.add('active');
        
        const grid = document.getElementById('grid');
        const loader = document.getElementById('loading-txt');
        grid.innerHTML = '';
        loader.style.display = 'block';

        try {
            const res = await fetch(PROXY + encodeURIComponent(CONFIG[type] + "?cache=" + Date.now()));
            const result = await res.json();
            const lectures = result.data.filter(i => i.type === 'file');

            grid.innerHTML = lectures.map(lec => `
                <div class="card" onclick="playVid('${lec.file_url}', '${lec.title.replace(/'/g, "")}')">
                    <div class="thumb">
                        <img src="${lec.thumbnail}" loading="lazy" onerror="this.src='https://via.placeholder.com/320x180/0d1117/fff?text=Lecture'">
                    </div>
                    <div class="info">${lec.title}</div>
                </div>
            `).join('');
            loader.style.display = 'none';
        } catch (e) {
            loader.innerHTML = "Error fetching data. Refresh page.";
        }
    }

    function playVid(url, title) {
        document.getElementById('modal').style.display = 'flex';
        document.getElementById('v-title').innerText = title;

        player.src({ src: url, type: 'application/x-mpegURL' });
        
        // Forced Play Logic
        player.ready(function() {
            player.play();
        });
    }

    function closePlayer() {
        document.getElementById('modal').style.display = 'none';
        player.pause();
        player.reset();
    }

    load('JEE');
</script>
</body>
</html>
