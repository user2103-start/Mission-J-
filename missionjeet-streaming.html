<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mission JEET — Study Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   CSS VARIABLES & RESET
═══════════════════════════════════════════════ */
:root {
  --glass: rgba(255,255,255,0.08);
  --glass-hover: rgba(255,255,255,0.14);
  --glass-strong: rgba(255,255,255,0.16);
  --glass-border: rgba(255,255,255,0.18);
  --glass-border-hover: rgba(255,255,255,0.35);
  --blur: blur(18px);
  --blur-sm: blur(10px);
  --teal: #00e5bc;
  --teal-dim: rgba(0,229,188,0.15);
  --red: #ff4757;
  --gold: #ffd32a;
  --white: #ffffff;
  --white-70: rgba(255,255,255,0.7);
  --white-40: rgba(255,255,255,0.4);
  --white-20: rgba(255,255,255,0.2);
  --shadow-glow: 0 8px 32px rgba(0,229,188,0.18);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.35);
  --radius: 18px;
  --radius-sm: 12px;
  --font: 'Sora', sans-serif;
  --font-mono: 'Space Mono', monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }

body {
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
  background: #0a0a0f;
  color: var(--white);
}

/* ═══════════════════════════════════════════════
   BACKGROUND LAYER — painted eyes image
═══════════════════════════════════════════════ */
#bg-layer {
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    linear-gradient(135deg, rgba(0,15,25,0.82) 0%, rgba(5,8,20,0.75) 50%, rgba(0,10,18,0.88) 100%),
    url('https://dxixtlyravvxx.cloudfront.net/1772100600/admin_v2/thumbnails//147818_131_drona%20neet%20banner%20website.jpg') center/cover no-repeat;
  filter: saturate(1.2);
}
/* Grain texture overlay */
#bg-layer::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.35;
  pointer-events: none;
}

/* Ambient orbs */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 12s ease-in-out infinite;
}
.orb-1 { width:400px; height:400px; background:rgba(0,229,188,0.08); top:-100px; right:-100px; animation-delay:0s; }
.orb-2 { width:350px; height:350px; background:rgba(255,71,87,0.07); bottom:10%; left:-80px; animation-delay:-5s; }
.orb-3 { width:300px; height:300px; background:rgba(255,211,42,0.05); top:40%; right:10%; animation-delay:-8s; }
@keyframes orbFloat {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-30px) scale(1.05); }
}

/* ═══════════════════════════════════════════════
   LAYOUT WRAPPER
═══════════════════════════════════════════════ */
#app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 16px 100px;
}

/* ═══════════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════════ */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 14px 0;
  margin: 0 -16px;
  padding-left: 16px;
  padding-right: 16px;
  background: rgba(5,5,15,0.6);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--glass-border);
}
.nav-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  max-width: 1400px;
  margin: 0 auto;
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  text-decoration: none;
}
.logo-mission { font-size: 1.1rem; font-weight: 700; color: var(--white); letter-spacing: -0.02em; }
.logo-jeet {
  background: var(--red);
  color: #fff;
  font-size: 1.1rem;
  font-weight: 800;
  padding: 2px 9px;
  border-radius: 6px;
  letter-spacing: 0.02em;
}
.nav-tabs {
  display: flex;
  gap: 4px;
  flex: 1;
  justify-content: center;
}
.nav-tab {
  padding: 8px 18px;
  border-radius: 50px;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--white-70);
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all 0.25s;
  background: transparent;
  font-family: var(--font);
  letter-spacing: 0.02em;
}
.nav-tab:hover { color: #fff; background: var(--glass); border-color: var(--glass-border); }
.nav-tab.active {
  color: #fff;
  background: var(--glass-strong);
  border-color: var(--teal);
  box-shadow: 0 0 16px rgba(0,229,188,0.2), inset 0 0 8px rgba(0,229,188,0.05);
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

/* Search */
.search-wrap {
  position: relative;
  display: flex;
  align-items: center;
}
.search-wrap svg {
  position: absolute;
  left: 12px;
  width: 15px;
  height: 15px;
  color: var(--white-40);
  pointer-events: none;
}
#searchInput {
  background: var(--glass);
  border: 1.5px solid var(--glass-border);
  border-radius: 50px;
  padding: 8px 14px 8px 34px;
  font-size: 0.8rem;
  color: #fff;
  font-family: var(--font);
  width: 180px;
  backdrop-filter: var(--blur-sm);
  transition: all 0.3s;
  outline: none;
}
#searchInput::placeholder { color: var(--white-40); }
#searchInput:focus {
  border-color: var(--teal);
  width: 220px;
  box-shadow: 0 0 16px rgba(0,229,188,0.15);
}

/* ═══════════════════════════════════════════════
   HERO / BANNER SECTION
═══════════════════════════════════════════════ */
.hero {
  margin: 24px 0 0;
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 16 / 5;
  min-height: 140px;
}
.hero-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.6s ease, opacity 0.5s;
}
.hero-img.loading-img { opacity: 0; }
.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, rgba(0,0,0,0.7) 0%, transparent 60%, rgba(0,0,0,0.3) 100%);
  display: flex;
  align-items: center;
  padding: 24px 32px;
}
.hero-content {}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--teal);
  color: #000;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 50px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.hero-title {
  font-size: clamp(1.4rem, 4vw, 2.2rem);
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 8px;
}
.hero-title span { color: var(--teal); }
.hero-meta {
  font-size: 0.8rem;
  color: var(--white-70);
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.hero-meta-item { display: flex; align-items: center; gap: 5px; }

/* ═══════════════════════════════════════════════
   COURSE DETAILS STRIP
═══════════════════════════════════════════════ */
.course-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin: 16px 0 24px;
}
.strip-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  backdrop-filter: var(--blur-sm);
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.25s;
}
.strip-card:hover { background: var(--glass-hover); border-color: var(--glass-border-hover); }
.strip-icon { font-size: 1.3rem; flex-shrink: 0; }
.strip-info {}
.strip-label { font-size: 0.68rem; color: var(--white-40); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; }
.strip-value { font-size: 0.9rem; font-weight: 700; color: #fff; margin-top: 2px; }

/* ═══════════════════════════════════════════════
   SECTION HEADINGS
═══════════════════════════════════════════════ */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::before {
  content: '';
  width: 3px;
  height: 18px;
  background: var(--teal);
  border-radius: 2px;
  box-shadow: 0 0 8px var(--teal);
}
.section-count {
  font-size: 0.75rem;
  color: var(--white-40);
  font-family: var(--font-mono);
}

/* ═══════════════════════════════════════════════
   LECTURES GRID
═══════════════════════════════════════════════ */
.lectures-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 14px;
}
@media (min-width: 600px) { .lectures-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 900px) { .lectures-grid { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 1200px) { .lectures-grid { grid-template-columns: repeat(5, 1fr); } }

/* ═══════════════════════════════════════════════
   LECTURE CARD
═══════════════════════════════════════════════ */
.lecture-card {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  backdrop-filter: var(--blur-sm);
  -webkit-backdrop-filter: var(--blur-sm);
  box-shadow: var(--shadow-card);
  transition: transform 0.28s cubic-bezier(.34,1.56,.64,1), box-shadow 0.28s, border-color 0.28s, background 0.28s;
  animation: cardIn 0.4s ease both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.lecture-card:hover {
  transform: translateY(-5px) scale(1.025);
  box-shadow: var(--shadow-glow), 0 16px 48px rgba(0,0,0,0.5);
  border-color: rgba(0,229,188,0.4);
  background: var(--glass-hover);
}
.lecture-card:active { transform: scale(0.97); }

/* Thumbnail */
.card-thumb {
  position: relative;
  aspect-ratio: 16 / 9;
  background: rgba(0,0,0,0.5);
  overflow: hidden;
}
.card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s ease;
  background: #111;
}
.lecture-card:hover .card-thumb img { transform: scale(1.06); }
.card-thumb-placeholder {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #0f1117, #1a1f2e);
  display: flex;
  align-items: center;
  justify-content: center;
}
.card-thumb-placeholder svg { width: 32px; height: 32px; opacity: 0.3; }

/* Play overlay */
.play-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0);
  transition: background 0.25s;
}
.lecture-card:hover .play-overlay { background: rgba(0,0,0,0.35); }
.play-btn-circle {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: rgba(0,229,188,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0.7);
  transition: opacity 0.25s, transform 0.3s cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 4px 20px rgba(0,229,188,0.5);
}
.lecture-card:hover .play-btn-circle { opacity: 1; transform: scale(1); }
.play-btn-circle svg { width: 16px; height: 16px; color: #000; margin-left: 2px; }

/* Subject badge */
.subject-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: var(--blur-sm);
  border: 1px solid var(--glass-border);
  color: var(--teal);
  font-size: 0.62rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 50px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.duration-badge {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(0,0,0,0.75);
  color: var(--white-70);
  font-size: 0.65rem;
  font-family: var(--font-mono);
  padding: 2px 6px;
  border-radius: 4px;
}

/* Card body */
.card-body { padding: 12px 12px 14px; }
.card-number {
  font-size: 0.62rem;
  font-family: var(--font-mono);
  color: var(--teal);
  letter-spacing: 0.06em;
  margin-bottom: 5px;
}
.card-title {
  font-size: 0.8rem;
  font-weight: 600;
  line-height: 1.4;
  color: var(--white-70);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  transition: color 0.2s;
}
.lecture-card:hover .card-title { color: #fff; }

/* ═══════════════════════════════════════════════
   FOLDER / CHAPTER ACCORDION
═══════════════════════════════════════════════ */
.chapter-group { margin-bottom: 12px; }
.chapter-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  backdrop-filter: var(--blur-sm);
  transition: all 0.25s;
}
.chapter-header:hover { background: var(--glass-hover); border-color: var(--glass-border-hover); }
.chapter-header.open { border-radius: var(--radius-sm) var(--radius-sm) 0 0; border-bottom-color: transparent; }
.chapter-icon { font-size: 1.1rem; flex-shrink: 0; }
.chapter-name { flex: 1; font-size: 0.88rem; font-weight: 600; }
.chapter-count {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--white-40);
}
.chapter-arrow {
  width: 20px;
  height: 20px;
  color: var(--white-40);
  transition: transform 0.3s;
  flex-shrink: 0;
}
.chapter-header.open .chapter-arrow { transform: rotate(90deg); }
.chapter-lectures {
  display: none;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--glass-border);
  border-top: none;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  padding: 8px;
}
.chapter-lectures.open { display: block; }
.chapter-lectures .lectures-grid { grid-template-columns: repeat(2, 1fr); }
@media (min-width: 600px) { .chapter-lectures .lectures-grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 900px) { .chapter-lectures .lectures-grid { grid-template-columns: repeat(4, 1fr); } }

/* ═══════════════════════════════════════════════
   LOADING SPINNER
═══════════════════════════════════════════════ */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 20px;
  gap: 20px;
}
.spinner-ring {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 3px solid rgba(0,229,188,0.15);
  border-top-color: var(--teal);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
  color: var(--white-40);
  font-size: 0.82rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px;
  gap: 12px;
  text-align: center;
}
.empty-icon { font-size: 3rem; opacity: 0.5; }
.empty-text { color: var(--white-40); font-size: 0.88rem; }

/* Error state */
.error-card {
  background: rgba(255,71,87,0.1);
  border: 1px solid rgba(255,71,87,0.3);
  border-radius: var(--radius-sm);
  padding: 16px 20px;
  color: #ff8a95;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 16px 0;
}

/* ═══════════════════════════════════════════════
   VIDEO PLAYER MODAL
═══════════════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  padding: 12px;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }

.player-modal {
  background: rgba(12,14,22,0.95);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  width: 100%;
  max-width: 860px;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.05);
  transform: scale(0.94) translateY(20px);
  transition: transform 0.35s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.open .player-modal { transform: scale(1) translateY(0); }

/* Video container */
.video-container {
  position: relative;
  background: #000;
  aspect-ratio: 16/9;
}
#videoPlayer {
  width: 100%;
  height: 100%;
  display: block;
  outline: none;
}
#videoPlayer::-webkit-media-controls { display: none !important; }
#videoPlayer::- moz-media-controls { display: none !important; }

/* Click to play/pause overlay */
#videoTapZone {
  position: absolute;
  inset: 0;
  cursor: pointer;
  z-index: 2;
}
.video-center-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(0,229,188,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  transition: transform 0.15s, opacity 0.3s;
  opacity: 0;
  z-index: 3;
}
.video-center-icon.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
  animation: iconFade 0.7s ease forwards;
}
@keyframes iconFade { 0%{opacity:1;transform:translate(-50%,-50%) scale(1)} 60%{opacity:1} 100%{opacity:0;transform:translate(-50%,-50%) scale(1.3)} }
.video-center-icon svg { width: 28px; height: 28px; color: #000; margin-left: 3px; }

/* Custom Controls */
.video-controls {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  padding: 30px 16px 12px;
  z-index: 4;
  opacity: 0;
  transition: opacity 0.3s;
}
.video-container:hover .video-controls,
.video-container.paused .video-controls { opacity: 1; }

/* Progress bar */
.progress-wrap {
  position: relative;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  cursor: pointer;
  margin-bottom: 10px;
  transition: height 0.2s;
}
.progress-wrap:hover { height: 6px; }
.progress-fill {
  height: 100%;
  background: var(--teal);
  border-radius: 2px;
  position: relative;
  transition: width 0.1s linear;
  pointer-events: none;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: -5px;
  top: 50%;
  transform: translateY(-50%);
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--teal);
  box-shadow: 0 0 8px var(--teal);
  opacity: 0;
  transition: opacity 0.2s;
}
.progress-wrap:hover .progress-fill::after { opacity: 1; }
.progress-buffered {
  position: absolute;
  top: 0;
  left: 0;
  height: 100%;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  pointer-events: none;
}

/* Controls row */
.controls-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.ctrl-btn {
  background: none;
  border: none;
  color: var(--white-70);
  cursor: pointer;
  padding: 5px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s, background 0.2s;
  font-family: var(--font);
}
.ctrl-btn:hover { color: #fff; background: rgba(255,255,255,0.1); }
.ctrl-btn svg { width: 18px; height: 18px; }

.time-display {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--white-70);
  letter-spacing: 0.04em;
  white-space: nowrap;
}
.ctrl-spacer { flex: 1; }

/* Volume */
.volume-wrap { display: flex; align-items: center; gap: 6px; }
.volume-slider {
  width: 70px;
  height: 3px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(255,255,255,0.25);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--teal);
  cursor: pointer;
}

/* Speed selector */
.speed-btn {
  font-size: 0.72rem;
  font-family: var(--font-mono);
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 5px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--white-70);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.speed-btn:hover { color: #fff; border-color: var(--teal); }

.speed-menu {
  position: absolute;
  bottom: calc(100% + 6px);
  right: 0;
  background: rgba(12,14,22,0.97);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  overflow: hidden;
  display: none;
  min-width: 80px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.speed-menu.show { display: block; }
.speed-option {
  padding: 8px 14px;
  font-size: 0.78rem;
  font-family: var(--font-mono);
  color: var(--white-70);
  cursor: pointer;
  transition: background 0.15s;
  text-align: center;
}
.speed-option:hover { background: var(--glass); color: #fff; }
.speed-option.active { color: var(--teal); font-weight: 700; }

/* Player info bar */
.player-info {
  padding: 14px 20px 16px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.player-title-wrap {}
.player-subject {
  font-size: 0.68rem;
  font-weight: 700;
  color: var(--teal);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 5px;
}
.player-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: #fff;
  line-height: 1.35;
}
#closeModal {
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: all 0.2s;
  color: var(--white-70);
}
#closeModal:hover { background: rgba(255,71,87,0.2); border-color: var(--red); color: var(--red); }
#closeModal svg { width: 16px; height: 16px; }

/* ═══════════════════════════════════════════════
   TOAST NOTIFICATION
═══════════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(12,14,22,0.95);
  border: 1px solid var(--glass-border);
  border-radius: 50px;
  padding: 10px 20px;
  font-size: 0.82rem;
  color: var(--white-70);
  z-index: 999;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
  backdrop-filter: var(--blur-sm);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════════
   BOTTOM NAV (mobile)
═══════════════════════════════════════════════ */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  background: rgba(5,5,15,0.85);
  backdrop-filter: var(--blur);
  border-top: 1px solid var(--glass-border);
  padding: 8px 0 env(safe-area-inset-bottom);
}
@media (max-width: 640px) {
  .bottom-nav { display: flex; }
  .nav-tabs { display: none; }
  #searchInput { width: 130px; }
  #searchInput:focus { width: 150px; }
  body { padding-bottom: 70px; }
}
.bnav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 0;
  cursor: pointer;
  color: var(--white-40);
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  transition: color 0.2s;
}
.bnav-item.active { color: var(--teal); }
.bnav-item svg { width: 20px; height: 20px; }

/* ═══════════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════════ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,229,188,0.3); }

/* ═══════════════════════════════════════════════
   MISC UTILITIES
═══════════════════════════════════════════════ */
.hidden { display: none !important; }
.fade-in { animation: fadeIn 0.4s ease both; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
</style>

<script>
/* ════════════════════════════════════════════
   CONSTANTS & STATE
════════════════════════════════════════════ */
const API = {
  batches:  'https://apiserver-jwex.onrender.com/api/missionjeet/batches',
  jeeDetail:'https://apiserver-jwex.onrender.com/api/missionjeet/course-details?courseid=151',
  neetDetail:'https://apiserver-jwex.onrender.com/api/missionjeet/course-details?courseid=152',
  jeeLec:   'https://apiserver-jwex.onrender.com/api/missionjeet/all-content/151',
  neetLec:  'https://apiserver-jwex.onrender.com/api/missionjeet/all-content/152',
};
const THUMB = {
  jee:  'https://dxixtlyravvxx.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/7261523_131_drona%20jee%20banner%20app.jpg',
  neet: 'https://dxixtlyravvxx.cloudfront.net/1772100600/admin_v2/thumbnails//147818_131_drona%20neet%20banner%20website.jpg',
};

const state = {
  activeTab: 'home',
  searchQuery: '',
  cache: {},
  allLectures: [],
};

/* ════════════════════════════════════════════
   UTILS
════════════════════════════════════════════ */
function showToast(msg, dur = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function fmtTime(s) {
  if (isNaN(s)) return '0:00';
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = Math.floor(s % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

async function fetchJSON(url) {
  if (state.cache[url]) return state.cache[url];
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  state.cache[url] = data;
  return data;
}

/* ════════════════════════════════════════════
   LOADING / ERROR TEMPLATES
════════════════════════════════════════════ */
function renderLoading(msg = 'Fetching content...') {
  return `<div class="loading-screen">
    <div class="spinner-ring"></div>
    <div class="loading-text">${msg}</div>
  </div>`;
}

function renderError(msg) {
  return `<div class="error-card">
    <span style="font-size:1.3rem">⚠️</span>
    <div>
      <div style="font-weight:700;margin-bottom:3px">Failed to load</div>
      <div style="font-size:0.78rem;opacity:.7">${msg}</div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════
   HERO BANNER
════════════════════════════════════════════ */
function renderHero(tab, courseData) {
  const imgSrc = THUMB[tab] || THUMB.jee;
  const label = tab === 'jee' ? 'JEE Main & Advanced' : 'NEET UG';
  const title = courseData?.name || (tab === 'jee' ? 'DRONA JEE <span>CLASS 11th</span>' : 'DRONA NEET <span>CLASS 11th</span>');
  const validity = courseData?.validity_days || '813';
  const price = courseData?.discounted_price ? `₹${courseData.discounted_price}` : '₹4,999';
  const students = courseData?.total_enrolled || '4,200+';

  return `
  <div class="hero">
    <img class="hero-img" src="${imgSrc}" alt="${label}" loading="eager"
      onerror="this.style.display='none'">
    <div class="hero-overlay">
      <div class="hero-content">
        <div class="hero-badge">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          Now Streaming
        </div>
        <div class="hero-title">DRONA <span>${tab.toUpperCase()}</span></div>
        <div class="hero-meta">
          <span class="hero-meta-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${validity} days validity
          </span>
          <span class="hero-meta-item">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            ${students} enrolled
          </span>
          <span class="hero-meta-item" style="color:var(--teal);font-weight:700">${price}</span>
        </div>
      </div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════
   COURSE DETAILS STRIP
════════════════════════════════════════════ */
function renderCourseStrip(data) {
  if (!data) return '';
  const items = [
    { icon: '📚', label: 'Course', value: data.name || 'DRONA Course' },
    { icon: '📅', label: 'Validity', value: `${data.validity_days || 813} days` },
    { icon: '💰', label: 'Price', value: data.discounted_price ? `₹${data.discounted_price}` : '₹4,999' },
    { icon: '👥', label: 'Students', value: data.total_enrolled ? `${data.total_enrolled}+` : '4200+' },
    { icon: '⭐', label: 'Rating', value: data.rating || '4.8 / 5' },
    { icon: '🎯', label: 'Batch', value: data.batch_name || 'Class 11th' },
  ];
  return `<div class="course-strip">
    ${items.map(i => `
      <div class="strip-card">
        <span class="strip-icon">${i.icon}</span>
        <div class="strip-info">
          <div class="strip-label">${i.label}</div>
          <div class="strip-value">${i.value}</div>
        </div>
      </div>`).join('')}
  </div>`;
}

/* ════════════════════════════════════════════
   LECTURE CARD
════════════════════════════════════════════ */
function getLectureThumbnail(lec) {
  return lec.thumbnail || lec.image || lec.cover_image ||
    lec.video_thumbnail || lec.thumb ||
    `https://img.youtube.com/vi/${lec.youtube_id || ''}/mqdefault.jpg`;
}

function getVideoUrl(lec) {
  return lec.video_url || lec.url || lec.stream_url ||
    lec.hls_url || lec.m3u8 || lec.mp4_url || '';
}

function getSubject(lec) {
  return lec.subject || lec.category || lec.tag || lec.chapter_subject || '';
}

function renderLectureCard(lec, index) {
  const thumb = getLectureThumbnail(lec);
  const title = lec.title || lec.name || lec.lecture_title || 'Lecture';
  const subject = getSubject(lec);
  const duration = lec.duration ? fmtTime(lec.duration) : '';
  const num = String(lec.order || lec.serial || index + 1).padStart(2, '0');

  const thumbHtml = thumb && !thumb.includes('undefined') && !thumb.includes('null')
    ? `<img src="${thumb}" alt="${title}" loading="lazy"
          onerror="this.parentElement.classList.add('no-img');this.style.display='none'">`
    : `<div class="card-thumb-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="7" width="20" height="15" rx="2"/>
          <polyline points="17,2 12,7 7,2"/>
        </svg>
      </div>`;

  return `
  <div class="lecture-card" data-index="${index}" onclick="openLecture(${index})">
    <div class="card-thumb">
      ${thumbHtml}
      ${subject ? `<div class="subject-badge">${subject}</div>` : ''}
      ${duration ? `<div class="duration-badge">${duration}</div>` : ''}
      <div class="play-overlay">
        <div class="play-btn-circle">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-number">EP ${num}</div>
      <div class="card-title">${title}</div>
    </div>
  </div>`;
}

/* ════════════════════════════════════════════
   RENDER LECTURES (flat or grouped)
════════════════════════════════════════════ */
function renderLecturesSection(lectures, searchQuery = '') {
  let list = lectures;

  // Search filter
  if (searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    list = lectures.filter(l =>
      (l.title || l.name || '').toLowerCase().includes(q) ||
      (getSubject(l) || '').toLowerCase().includes(q)
    );
  }

  if (!list.length) {
    return `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">${searchQuery ? `No results for "${searchQuery}"` : 'No lectures found'}</div>
    </div>`;
  }

  // Group by chapter/subject if available
  const groups = {};
  let hasGroups = false;
  list.forEach((lec, i) => {
    const g = lec.chapter_name || lec.folder || lec.section || lec.topic || lec.module || null;
    if (g) {
      hasGroups = true;
      if (!groups[g]) groups[g] = [];
      groups[g].push({ lec, origIndex: lectures.indexOf(lec) });
    } else {
      if (!groups['__flat__']) groups['__flat__'] = [];
      groups['__flat__'].push({ lec, origIndex: lectures.indexOf(lec) });
    }
  });

  if (!hasGroups) {
    // Flat grid
    return `
    <div class="section-head">
      <div class="section-title">All Lectures</div>
      <div class="section-count">${list.length} videos</div>
    </div>
    <div class="lectures-grid">
      ${list.map((lec, i) => renderLectureCard(lec, lectures.indexOf(lec))).join('')}
    </div>`;
  }

  // Grouped accordion
  let html = '';
  let gi = 0;
  for (const [gname, items] of Object.entries(groups)) {
    if (gname === '__flat__') {
      html += `<div class="lectures-grid" style="margin-bottom:16px">
        ${items.map(({ lec, origIndex }) => renderLectureCard(lec, origIndex)).join('')}
      </div>`;
    } else {
      const icons = ['📘','📙','📗','📕','📓','📔','📒','📃'];
      html += `
      <div class="chapter-group">
        <div class="chapter-header${gi === 0 ? ' open' : ''}" onclick="toggleChapter(this)">
          <span class="chapter-icon">${icons[gi % icons.length]}</span>
          <span class="chapter-name">${gname}</span>
          <span class="chapter-count">${items.length} lectures</span>
          <svg class="chapter-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="9,18 15,12 9,6"/>
          </svg>
        </div>
        <div class="chapter-lectures${gi === 0 ? ' open' : ''}">
          <div class="lectures-grid">
            ${items.map(({ lec, origIndex }) => renderLectureCard(lec, origIndex)).join('')}
          </div>
        </div>
      </div>`;
      gi++;
    }
  }
  return `<div class="section-head">
    <div class="section-title">Course Content</div>
    <div class="section-count">${list.length} videos</div>
  </div>` + html;
}

/* ════════════════════════════════════════════
   HOME PAGE
════════════════════════════════════════════ */
async function renderHome() {
  const el = document.getElementById('mainContent');
  el.innerHTML = renderLoading('Loading courses...');

  try {
    // Fetch both in parallel
    const [jeeData, neetData, batches] = await Promise.allSettled([
      fetchJSON(API.jeeDetail),
      fetchJSON(API.neetDetail),
      fetchJSON(API.batches),
    ]);

    const jee = jeeData.status === 'fulfilled' ? jeeData.value : null;
    const neet = neetData.status === 'fulfilled' ? neetData.value : null;

    el.innerHTML = `
    <!-- Hero rotating banners -->
    <div style="position:relative;margin-top:24px">
      <div id="homeHeroJee">${renderHero('jee', jee)}</div>
    </div>

    <!-- Course cards -->
    <div style="margin-top:24px">
      <div class="section-head">
        <div class="section-title">Available Courses</div>
        <div class="section-count">2 courses</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:28px">
        ${renderCourseCard('jee', jee)}
        ${renderCourseCard('neet', neet)}
      </div>
    </div>

    <!-- Batch info if available -->
    ${batches.status === 'fulfilled' ? renderBatches(batches.value) : ''}
    `;

    // Animate hero banner alternation
    startHomeHeroSwap();

  } catch (err) {
    el.innerHTML = renderError(err.message);
  }
}

let heroSwapTimer = null;
function startHomeHeroSwap() {
  let cur = 'jee';
  heroSwapTimer = setInterval(() => {
    cur = cur === 'jee' ? 'neet' : 'jee';
    const el = document.getElementById('homeHeroJee');
    if (!el) { clearInterval(heroSwapTimer); return; }
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.5s';
    setTimeout(() => {
      el.innerHTML = renderHero(cur, null);
      el.style.opacity = '1';
    }, 500);
  }, 4000);
}

function renderCourseCard(tab, data) {
  const labels = { jee:'JEE Main & Advanced', neet:'NEET UG' };
  const colors = { jee:'#00e5bc', neet:'#ff6b8a' };
  const img = THUMB[tab];
  const price = data?.discounted_price || '4,999';
  const oldPrice = data?.original_price || '5,998';

  return `
  <div class="lecture-card" onclick="switchTab('${tab}')" style="cursor:pointer">
    <div class="card-thumb" style="aspect-ratio:16/7">
      <img src="${img}" alt="${tab.toUpperCase()}" style="width:100%;height:100%;object-fit:cover">
      <div class="play-overlay">
        <div class="play-btn-circle" style="background:${colors[tab]}">
          <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
      <div class="subject-badge" style="background:${colors[tab]};color:#000">${tab.toUpperCase()}</div>
    </div>
    <div class="card-body" style="padding:16px">
      <div style="font-weight:800;font-size:.95rem;margin-bottom:6px">DRONA ${tab.toUpperCase()} CLASS 11TH</div>
      <div style="font-size:.78rem;color:var(--white-40);margin-bottom:10px">${labels[tab]}</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:1.1rem;font-weight:800;color:${colors[tab]}">₹${price}</span>
        <span style="font-size:.8rem;color:var(--white-40);text-decoration:line-through">₹${oldPrice}</span>
        <span style="font-size:.7rem;background:rgba(0,229,188,.15);color:var(--teal);padding:2px 8px;border-radius:50px;margin-left:auto">16.68% off</span>
      </div>
      <div style="margin-top:12px;background:var(--glass);border:1px solid var(--glass-border);border-radius:8px;padding:8px 12px;font-size:.78rem;color:var(--teal);text-align:center;font-weight:600">
        View Lectures →
      </div>
    </div>
  </div>`;
}

function renderBatches(data) {
  const batches = Array.isArray(data) ? data : (data?.batches || data?.data || []);
  if (!batches.length) return '';
  return `
  <div style="margin-top:8px">
    <div class="section-head">
      <div class="section-title">Batches</div>
      <div class="section-count">${batches.length} batches</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px">
      ${batches.map(b => `
        <div class="strip-card">
          <span class="strip-icon">🎓</span>
          <div class="strip-info">
            <div class="strip-label">${b.subject || b.type || 'Batch'}</div>
            <div class="strip-value">${b.name || b.batch_name || b.title || 'Batch'}</div>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

/* ════════════════════════════════════════════
   JEE / NEET PAGES
════════════════════════════════════════════ */
async function renderCoursePage(tab) {
  const el = document.getElementById('mainContent');
  el.innerHTML = renderLoading(`Loading ${tab.toUpperCase()} content...`);

  const detailUrl = tab === 'jee' ? API.jeeDetail : API.neetDetail;
  const lecUrl    = tab === 'jee' ? API.jeeLec    : API.neetLec;

  try {
    const [courseRes, lecRes] = await Promise.allSettled([
      fetchJSON(detailUrl),
      fetchJSON(lecUrl),
    ]);

    const course = courseRes.status === 'fulfilled' ? courseRes.value : null;
    const lecRaw = lecRes.status === 'fulfilled' ? lecRes.value : null;

    // Extract lecture array from various possible shapes
    const lectures = extractLectures(lecRaw);
    state.allLectures = lectures;

    // Background reflects active course
    document.getElementById('bg-layer').style.background =
      `linear-gradient(135deg, rgba(0,15,25,0.85) 0%, rgba(5,8,20,0.78) 50%, rgba(0,10,18,0.9) 100%),
       url('${THUMB[tab]}') center/cover no-repeat`;

    el.innerHTML = `
      ${renderHero(tab, course)}
      ${renderCourseStrip(course)}
      ${lecRes.status === 'rejected' ? renderError(lecRes.reason?.message || 'Failed to load lectures') : ''}
      <div id="lecturesContainer">
        ${lectures.length ? renderLecturesSection(lectures, state.searchQuery) : `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-text">No lectures available yet</div>
          </div>`}
      </div>
    `;

    // Staggered card animations
    requestAnimationFrame(() => {
      document.querySelectorAll('.lecture-card').forEach((c, i) => {
        c.style.animationDelay = `${i * 0.04}s`;
      });
    });

  } catch (err) {
    el.innerHTML = renderError(err.message);
  }
}

function extractLectures(raw) {
  if (!raw) return [];
  if (Array.isArray(raw)) return raw;

  // Common API response shapes
  const keys = ['lectures', 'data', 'content', 'items', 'videos', 'lessons', 'results'];
  for (const key of keys) {
    if (Array.isArray(raw[key])) return raw[key];
  }

  // Nested: { data: { lectures: [...] } }
  if (raw.data && typeof raw.data === 'object') {
    for (const key of keys) {
      if (Array.isArray(raw.data[key])) return raw.data[key];
    }
    if (Array.isArray(Object.values(raw.data)[0])) return Object.values(raw.data)[0];
  }

  // { chapters: [{ lectures: [...] }] }
  if (Array.isArray(raw.chapters)) {
    return raw.chapters.flatMap(ch =>
      (ch.lectures || ch.content || ch.items || []).map(l => ({
        ...l,
        chapter_name: l.chapter_name || ch.name || ch.title || ch.chapter_name
      }))
    );
  }

  return [];
}

/* ════════════════════════════════════════════
   TAB SWITCHING
════════════════════════════════════════════ */
function switchTab(tab) {
  if (heroSwapTimer) { clearInterval(heroSwapTimer); heroSwapTimer = null; }
  state.activeTab = tab;
  state.searchQuery = '';
  document.getElementById('searchInput').value = '';

  // Update nav tabs
  document.querySelectorAll('.nav-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  document.querySelectorAll('.bnav-item').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });

  if (tab === 'home') renderHome();
  else if (tab === 'jee') renderCoursePage('jee');
  else if (tab === 'neet') renderCoursePage('neet');
  else if (tab === 'search') {
    document.getElementById('searchInput').focus();
  }
}

/* ════════════════════════════════════════════
   SEARCH
════════════════════════════════════════════ */
let searchTimer = null;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  state.searchQuery = q;
  searchTimer = setTimeout(() => {
    const container = document.getElementById('lecturesContainer');
    if (container && state.allLectures.length) {
      container.innerHTML = renderLecturesSection(state.allLectures, q);
      requestAnimationFrame(() => {
        document.querySelectorAll('.lecture-card').forEach((c, i) => {
          c.style.animationDelay = `${i * 0.035}s`;
        });
      });
    }
  }, 300);
});

/* ════════════════════════════════════════════
   CHAPTER ACCORDION
════════════════════════════════════════════ */
function toggleChapter(header) {
  const items = header.nextElementSibling;
  header.classList.toggle('open');
  items.classList.toggle('open');
}

/* ════════════════════════════════════════════
   VIDEO PLAYER
════════════════════════════════════════════ */
const video = document.getElementById('videoPlayer');
const overlay = document.getElementById('modalOverlay');
const ppBtn = document.getElementById('playPauseBtn');
const ppIcon = document.getElementById('ppIcon');
const progressFill = document.getElementById('progressFill');
const progressBuffered = document.getElementById('progressBuffered');
const progressWrap = document.getElementById('progressWrap');
const timeDisplay = document.getElementById('timeDisplay');
const volumeSlider = document.getElementById('volumeSlider');
const speedBtn = document.getElementById('speedBtn');
const speedMenu = document.getElementById('speedMenu');
const videoContainer = document.getElementById('videoContainer');
const centerIcon = document.getElementById('centerIcon');
const centerIconSvg = document.getElementById('centerIconSvg');

const PLAY_SVG = `<polygon points="5,3 19,12 5,21"/>`;
const PAUSE_SVG = `<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`;

function openLecture(index) {
  const lec = state.allLectures[index];
  if (!lec) return;

  const url = getVideoUrl(lec);
  const title = lec.title || lec.name || 'Lecture';
  const subject = getSubject(lec);

  document.getElementById('playerTitle').textContent = title;
  document.getElementById('playerSubject').textContent = subject || state.activeTab.toUpperCase();

  if (url) {
    video.src = url;
    video.load();
    video.play().catch(() => {});
  } else {
    showToast('⚠️ No video URL available for this lecture');
    video.src = '';
  }

  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  updatePlayIcon();
}

function closePlayer() {
  overlay.classList.remove('open');
  video.pause();
  video.src = '';
  document.body.style.overflow = '';
  speedMenu.classList.remove('show');
}

document.getElementById('closeModal').addEventListener('click', closePlayer);
overlay.addEventListener('click', e => { if (e.target === overlay) closePlayer(); });

// Tap zone
document.getElementById('videoTapZone').addEventListener('click', () => {
  if (video.paused) {
    video.play();
    showCenterIcon('play');
  } else {
    video.pause();
    showCenterIcon('pause');
  }
  updatePlayIcon();
});

function showCenterIcon(type) {
  centerIcon.classList.remove('show');
  void centerIcon.offsetWidth;
  if (type === 'play') {
    centerIconSvg.innerHTML = PLAY_SVG;
  } else {
    centerIconSvg.innerHTML = PAUSE_SVG;
  }
  centerIcon.classList.add('show');
}

ppBtn.addEventListener('click', () => {
  if (video.paused) video.play(); else video.pause();
  updatePlayIcon();
});

document.getElementById('skipBackBtn').addEventListener('click', () => {
  video.currentTime = Math.max(0, video.currentTime - 10);
  showToast('⏮ -10s');
});
document.getElementById('skipFwdBtn').addEventListener('click', () => {
  video.currentTime = Math.min(video.duration || 0, video.currentTime + 10);
  showToast('⏭ +10s');
});

video.addEventListener('play', () => { updatePlayIcon(); videoContainer.classList.remove('paused'); });
video.addEventListener('pause', () => { updatePlayIcon(); videoContainer.classList.add('paused'); });

video.addEventListener('timeupdate', () => {
  if (!video.duration) return;
  const pct = (video.currentTime / video.duration) * 100;
  progressFill.style.width = pct + '%';
  timeDisplay.textContent = `${fmtTime(video.currentTime)} / ${fmtTime(video.duration)}`;
});

video.addEventListener('progress', () => {
  if (video.buffered.length && video.duration) {
    const buffPct = (video.buffered.end(video.buffered.length - 1) / video.duration) * 100;
    progressBuffered.style.width = buffPct + '%';
  }
});

// Progress seek
progressWrap.addEventListener('click', e => {
  const rect = progressWrap.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  video.currentTime = ratio * (video.duration || 0);
});
progressWrap.addEventListener('touchstart', e => {
  const rect = progressWrap.getBoundingClientRect();
  const ratio = (e.touches[0].clientX - rect.left) / rect.width;
  video.currentTime = ratio * (video.duration || 0);
}, { passive: true });

// Volume
volumeSlider.addEventListener('input', e => {
  video.volume = e.target.value;
  video.muted = video.volume === 0;
  updateVolIcon();
});
document.getElementById('muteBtn').addEventListener('click', () => {
  video.muted = !video.muted;
  volumeSlider.value = video.muted ? 0 : video.volume || 1;
  updateVolIcon();
});

function updateVolIcon() {
  const icon = document.getElementById('volIcon');
  if (video.muted || video.volume === 0) {
    icon.innerHTML = `<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
      <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;
  } else {
    icon.innerHTML = `<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
  }
}

// Speed
speedBtn.addEventListener('click', e => {
  e.stopPropagation();
  speedMenu.classList.toggle('show');
});
speedMenu.querySelectorAll('.speed-option').forEach(opt => {
  opt.addEventListener('click', () => {
    const spd = parseFloat(opt.dataset.speed);
    video.playbackRate = spd;
    speedBtn.textContent = spd + '×';
    speedMenu.querySelectorAll('.speed-option').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    speedMenu.classList.remove('show');
  });
});
document.addEventListener('click', () => speedMenu.classList.remove('show'));

// Fullscreen
document.getElementById('fullscreenBtn').addEventListener('click', () => {
  const fsEl = document.getElementById('playerModal');
  if (!document.fullscreenElement) {
    (fsEl.requestFullscreen || fsEl.webkitRequestFullscreen || fsEl.mozRequestFullScreen).call(fsEl);
  } else {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  }
});

function updatePlayIcon() {
  ppIcon.innerHTML = video.paused ? PLAY_SVG : PAUSE_SVG;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (!overlay.classList.contains('open')) return;
  if (e.key === 'Escape') closePlayer();
  if (e.key === ' ') { e.preventDefault(); if(video.paused) video.play(); else video.pause(); updatePlayIcon(); }
  if (e.key === 'ArrowLeft') video.currentTime -= 10;
  if (e.key === 'ArrowRight') video.currentTime += 10;
  if (e.key === 'ArrowUp') { video.volume = Math.min(1, video.volume + 0.1); volumeSlider.value = video.volume; }
  if (e.key === 'ArrowDown') { video.volume = Math.max(0, video.volume - 0.1); volumeSlider.value = video.volume; }
  if (e.key === 'f') document.getElementById('fullscreenBtn').click();
});

/* ════════════════════════════════════════════
   NAV EVENTS
════════════════════════════════════════════ */
document.querySelectorAll('.nav-tab').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});
document.querySelectorAll('.bnav-item').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
switchTab('home');
</script>
