<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Mission JEET</title>

<style>

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{
  --g1:#4a7c4e;--g2:#3d6b41;--g3:#2d5231;--glow:rgba(74,124,78,0.3);
  --gd:rgba(74,124,78,0.12);--gd2:rgba(74,124,78,0.07);
  --glass:rgba(255,255,255,0.07);--glassH:rgba(255,255,255,0.11);
  --border:rgba(255,255,255,0.10);--borderH:rgba(255,255,255,0.20);
  --dark:#060a06;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:14px;--rs:10px;
}
html,body{min-height:100%;overflow-x:hidden}
body{font-family:var(--font);color:#e8f0e8;background:var(--dark)}

  background:

  opacity:0.4;
}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  height:56px;display:flex;align-items:center;gap:10px;padding:0 14px;
  background:rgba(6,10,6,0.72);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(74,124,78,0.18);
}
.logo{display:flex;align-items:center;gap:7px;flex-shrink:0;text-decoration:none}
.lm{font-size:1.05rem;font-weight:800;color:#e8f0e8;letter-spacing:-0.02em}
.lj{background:#5a3a2a;color:#e8c090;font-size:1.05rem;font-weight:900;padding:2px 9px;border-radius:5px;letter-spacing:.04em}
.ntabs{display:flex;gap:3px;flex:1;justify-content:center}
.ntab{
  padding:6px 15px;border-radius:50px;font-size:0.78rem;font-weight:600;
  color:rgba(232,240,232,0.45);cursor:pointer;border:1.5px solid transparent;
  background:none;font-family:var(--font);transition:all .2s;
}
.ntab:hover{color:#e8f0e8;background:var(--glass)}
.ntab.on{
  color:#b8dbb8;background:var(--gd);
  border-color:rgba(74,124,78,0.4);
  box-shadow:0 0 18px var(--glow),inset 0 0 8px rgba(74,124,78,0.06);
}
.nav-r{display:flex;align-items:center;flex-shrink:0}
.swrap{position:relative;display:flex;align-items:center}
.swrap svg{position:absolute;left:10px;width:13px;height:13px;color:rgba(232,240,232,0.3);pointer-events:none}
#SI{
  background:var(--glass);border:1px solid var(--border);
  border-radius:50px;padding:7px 12px 7px 30px;
  font-size:0.76rem;color:#e8f0e8;font-family:var(--font);
  width:148px;outline:none;transition:all .25s;
}
#SI::placeholder{color:rgba(232,240,232,0.25)}
#SI:focus{border-color:rgba(74,124,78,0.5);width:185px;box-shadow:0 0 12px rgba(74,124,78,0.15)}

/* MAIN */
#app{position:relative;z-index:1;max-width:1380px;margin:0 auto;padding:0 12px 90px}

/* HERO */
.hero{
  margin-top:16px;border-radius:var(--r);overflow:hidden;
  aspect-ratio:21/7;min-height:120px;position:relative;
  border:1px solid rgba(74,124,78,0.2);
  box-shadow:0 16px 48px rgba(0,0,0,0.6),0 0 0 1px rgba(74,124,78,0.08);
}
.hero-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;display:block;
}
.hero-grad{
  position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(0,0,0,0.82) 0%,rgba(0,0,0,0.45) 50%,rgba(0,0,0,0.2) 100%);
}
.hero-body{
  position:absolute;inset:0;display:flex;flex-direction:column;
  justify-content:center;padding:18px 24px;
}
.hpill{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--g1);color:#e8f0e8;
  font-size:0.6rem;font-weight:800;
  padding:4px 12px;border-radius:50px;
  letter-spacing:0.1em;text-transform:uppercase;
  width:fit-content;margin-bottom:10px;
  box-shadow:0 0 16px rgba(74,124,78,0.4);border:1px solid rgba(74,124,78,0.5);
}
.hpill svg{width:8px;height:8px}
.hh{
  font-size:clamp(1.2rem,3.8vw,1.9rem);font-weight:900;
  letter-spacing:-0.03em;line-height:1.05;margin-bottom:8px;color:#e8f0e8;
}
.hh em{color:#8dc88d;font-style:normal}
.hmeta{display:flex;gap:12px;flex-wrap:wrap}
.hmeta span{font-size:0.72rem;color:rgba(232,240,232,0.6);display:flex;align-items:center;gap:4px}
.hmeta .pr{color:#8dc88d;font-weight:800;font-size:.82rem}

/* STRIP */
.strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:9px;margin:12px 0 18px}
.sc{
  background:var(--gd2);border:1px solid var(--border);
  border-radius:var(--rs);padding:11px 13px;
  backdrop-filter:blur(8px);display:flex;align-items:center;gap:8px;transition:all .2s;
}
.sc:hover{background:var(--gd);border-color:rgba(74,124,78,0.3)}
.sc-ico{font-size:1.15rem;flex-shrink:0}
.sc-l{font-size:0.6rem;color:rgba(232,240,232,0.3);text-transform:uppercase;letter-spacing:.07em;font-weight:600}
.sc-v{font-size:0.82rem;font-weight:700;color:#e8f0e8;margin-top:1px}

/* SEC HEAD */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.st{font-size:0.92rem;font-weight:700;display:flex;align-items:center;gap:8px;color:#e8f0e8}
.st::before{content:'';width:3px;height:15px;background:var(--g1);border-radius:2px;box-shadow:0 0 8px var(--g1)}
.sn{font-size:0.7rem;color:rgba(232,240,232,0.3);font-family:var(--mono)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
@media(min-width:520px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:780px){.grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1080px){.grid{grid-template-columns:repeat(5,1fr)}}

/* CARD */
.card{
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;cursor:pointer;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 3px 16px rgba(0,0,0,0.35);
  transition:transform .27s cubic-bezier(.34,1.56,.64,1),box-shadow .27s,border-color .2s,background .2s;
  animation:cardUp .38s ease both;
}
@keyframes cardUp{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.card:hover{
  transform:translateY(-4px) scale(1.02);
  background:var(--glassH);border-color:rgba(74,124,78,0.35);

<script>
const BASE='https://apiserver-jwex.onrender.com/api/missionjeet';
const URLS={
  jeeD:BASE+'/course-details?courseid=151',
  neetD:BASE+'/course-details?courseid=152',
  jeeLec:BASE+'/all-content/151',
  neetLec:BASE+'/all-content/152',
  batches:BASE+'/batches'
};
const THUMB={
  jee:'https://dxixtlyravvxx.cloudfront.net/1772100600/admin_v2/uploads/courses/thumbnail/7261523_131_drona%20jee%20banner%20app.jpg',
  neet:'https://dxixtlyravvxx.cloudfront.net/1772100600/admin_v2/thumbnails//147818_131_drona%20neet%20banner%20website.jpg'
};
const S={tab:'home',lecs:[],q:'',cache:{}};

// PROXY FETCH — 3 fallbacks to fix CORS on GitHub Pages
async function apiFetch(url){
  if(S.cache[url]) return S.cache[url];
  const proxies=[
    u=>'https://corsproxy.io/?'+encodeURIComponent(u),
    u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
    u=>'https://thingproxy.freeboard.io/fetch/'+u
  ];
  // Try direct
  try{
    const r=await fetch(url,{mode:'cors'});
    if(r.ok){const d=await r.json();S.cache[url]=d;return d;}
  }catch(e){}
  // Try proxies
  for(const mk of proxies){
    try{
      const r=await fetch(mk(url));
      if(r.ok){const t=await r.text();const d=JSON.parse(t);S.cache[url]=d;return d;}
    }catch(e){continue;}
  }
  throw new Error('Failed to fetch — API may be offline (Render cold start ~30s)');
}

function ft(s){
  if(!s||isNaN(s)) return '0:00';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);
  return h>0?h+':'+p(m)+':'+p(sec):m+':'+p(sec);
}
function p(n){return String(n).padStart(2,'0')}

function toast(msg,d){
  d=d||2200;
  var t=document.getElementById('TST');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},d);
}

function exLecs(raw){
  if(!raw) return [];
  if(Array.isArray(raw)) return raw;
  var keys=['lectures','data','content','items','videos','lessons','results','subjects'];
  for(var k of keys) if(Array.isArray(raw[k])) return raw[k];
  if(raw.data&&typeof raw.data==='object'){
    for(var k of keys) if(Array.isArray(raw.data[k])) return raw.data[k];
    var vals=Object.values(raw.data);
    if(vals.length&&Array.isArray(vals[0])) return vals[0];
  }
  if(Array.isArray(raw.chapters)){
    return raw.chapters.flatMap(function(ch){
      return (ch.lectures||ch.content||ch.items||[]).map(function(l){
        return Object.assign({},l,{chapter_name:l.chapter_name||ch.name||ch.title});
      });
    });
  }
  var first=Object.values(raw).find(function(v){return Array.isArray(v)&&v.length>0&&typeof v[0]==='object'});
  return first||[];
}

function getThumb(l){return l.thumbnail||l.image||l.cover_image||l.video_thumbnail||l.thumb||(l.youtube_id?'https://img.youtube.com/vi/'+l.youtube_id+'/mqdefault.jpg':'')||'';}
function getVid(l){return l.video_url||l.url||l.stream_url||l.hls_url||l.m3u8||l.mp4_url||l.link||'';}
function getSub(l){return l.subject||l.category||l.tag||l.chapter_subject||l.subject_name||'';}

// TEMPLATES
function TSpinner(msg){
  return '<div class="spwrap"><div class="ring"></div><div class="sptxt">'+(msg||'Loading...')+'</div></div>';
}

function TErr(msg,urlKey){
  return '<div class="errc"><span style="font-size:1.1rem">⚠️</span><div><div style="font-weight:700;margin-bottom:2px">Failed to load</div><div style="font-size:.72rem;opacity:.65">'+msg+'</div></div><button onclick="retry(\''+urlKey+'\')">Retry</button></div>';
}

function retry(tab){
  delete S.cache[URLS[tab+'Lec']];
  delete S.cache[URLS[tab+'D']];
  renderCourse(tab);
}

function THero(tab,course){
  var img=THUMB[tab];
  var name=tab==='jee'?'DRONA <em>JEE</em>':'DRONA <em>NEET</em>';
  var days=(course&&course.validity_days)||'813';
  var price=(course&&course.discounted_price)||'4,999';
  var stud=(course&&course.total_enrolled)||'4,200+';
  return '<div class="hero">'+
    '<img class="hero-img" src="'+img+'" loading="eager" onerror="this.style.opacity=\'0\'">'+
    '<div class="hero-grad"></div>'+
    '<div class="hero-body">'+
      '<div class="hpill"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>NOW STREAMING</div>'+
      '<div class="hh">'+name+'</div>'+
      '<div class="hmeta">'+
        '<span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>'+days+' days</span>'+
        '<span><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>'+stud+'</span>'+
        '<span class="pr">&#8377;'+price+'</span>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function TStrip(c){
  if(!c) return '';
  var items=[
    {i:'📚',l:'Course',v:c.name||'DRONA'},
    {i:'📅',l:'Validity',v:(c.validity_days||813)+' days'},
    {i:'💰',l:'Price',v:'&#8377;'+(c.discounted_price||'4,999')},
    {i:'👥',l:'Students',v:(c.total_enrolled||'4200')+'+'},
    {i:'⭐',l:'Rating',v:c.rating||'4.8/5'},
    {i:'🎯',l:'Batch',v:c.batch_name||'Class 11th'}
  ];
  return '<div class="strip">'+items.map(function(x){
    return '<div class="sc"><span class="sc-ico">'+x.i+'</span><div><div class="sc-l">'+x.l+'</div><div class="sc-v">'+x.v+'</div></div></div>';
  }).join('')+'</div>';
}

function TCard(lec,idx,allLecs){
  var t=lec.title||lec.name||lec.lecture_title||'Lecture';
  var thumb=getThumb(lec);
  var sub=getSub(lec);
  var dur=lec.duration?ft(lec.duration):'';
  var ep=String(lec.order||lec.serial||idx+1).padStart(2,'0');
  var origIdx=allLecs?allLecs.indexOf(lec):idx;
  var thumbHtml=thumb&&thumb.length>5
    ?'<img src="'+thumb+'" loading="lazy" onerror="this.style.display=\'none\'">'
    :'<div class="cthumb-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17,2 12,7 7,2"/></svg></div>';
  return '<div class="card" onclick="openL('+origIdx+')">'+
    '<div class="cthumb">'+thumbHtml+
      (sub?'<div class="csubj">'+sub+'</div>':'')+
      (dur?'<div class="cdur">'+dur+'</div>':'')+
      '<div class="cpov"><div class="cplay"><svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></div></div>'+
    '</div>'+
    '<div class="cbody"><div class="cep">EP '+ep+'</div><div class="ctitle">'+t+'</div></div>'+
  '</div>';
}

function TLectures(lecs,q){
  var list=lecs;
  if(q&&q.trim()){
    var ql=q.toLowerCase();
    list=lecs.filter(function(l){return (l.title||l.name||'').toLowerCase().indexOf(ql)>-1||(getSub(l)||'').toLowerCase().indexOf(ql)>-1;});
  }
  if(!list.length) return '<div class="empty"><div class="emico">🔍</div><div class="emtxt">'+(q?'No results for "'+q+'"':'No lectures found')+'</div></div>';

  // Check grouping
  var groups={};var hasG=false;
  list.forEach(function(l){
    var g=l.chapter_name||l.folder||l.section||l.topic||l.module||null;
    if(g){hasG=true;if(!groups[g])groups[g]=[];groups[g].push(l);}
    else{if(!groups['__f'])groups['__f']=[];groups['__f'].push(l);}
  });

  if(!hasG){
    return '<div class="sh"><div class="st">All Lectures</div><div class="sn">'+list.length+' videos</div></div>'+
      '<div class="grid">'+list.map(function(l){return TCard(l,lecs.indexOf(l),lecs);}).join('')+'</div>';
  }

  var icos=['📘','📙','📗','📕','📓','📔','📒','📃'];
  var h='<div class="sh"><div class="st">Course Content</div><div class="sn">'+list.length+' videos</div></div>';
  var gi=0;
  for(var g in groups){
    var items=groups[g];
    if(g==='__f'){h+='<div class="grid" style="margin-bottom:10px">'+items.map(function(l){return TCard(l,lecs.indexOf(l),lecs);}).join('')+'</div>';}
    else{
      h+='<div class="chgrp">'+
        '<div class="chhd'+(gi===0?' open':'')+'" onclick="toggleCh(this)">'+
          '<span class="chico">'+icos[gi%icos.length]+'</span>'+
          '<span class="chnm">'+g+'</span>'+
          '<span class="chct">'+items.length+' lectures</span>'+
          '<svg class="charr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9,18 15,12 9,6"/></svg>'+
        '</div>'+
        '<div class="chbody'+(gi===0?' open':'')+'">'+
          '<div class="grid">'+items.map(function(l){return TCard(l,lecs.indexOf(l),lecs);}).join('')+'</div>'+
        '</div>'+
      '</div>';
      gi++;
    }
  }
  return h;
}

function TCC(tab,d){
  var lbl={jee:'JEE Main & Advanced',neet:'NEET UG'};
  return '<div class="cc" onclick="switchTab(\''+tab+'\')">'+
    '<div class="ccover">'+
      '<img src="'+THUMB[tab]+'" loading="lazy" onerror="this.style.opacity=\'0\'">'+
      '<div class="ccov"></div>'+
      '<div class="cctag">'+tab.toUpperCase()+'</div>'+
    '</div>'+
    '<div class="ccbody">'+
      '<div class="ccname">DRONA '+tab.toUpperCase()+' CLASS 11TH</div>'+
      '<div class="ccsub">'+lbl[tab]+'</div>'+
      '<div class="ccpr">'+
        '<span class="ccp1">&#8377;'+(d&&d.discounted_price?d.discounted_price:'4,999')+'</span>'+
        '<span class="ccp2">&#8377;'+(d&&d.original_price?d.original_price:'5,998')+'</span>'+
        '<span class="ccoff">16.68% off</span>'+
      '</div>'+
      '<div class="ccbtn">View Lectures &#8594;</div>'+
    '</div>'+
  '</div>';
}

// PAGES
var heroTimer=null;
async function renderHome(){
  var el=document.getElementById('app');
  el.innerHTML=TSpinner('Fetching courses...');
  try{
    var results=await Promise.allSettled([apiFetch(URLS.jeeD),apiFetch(URLS.neetD)]);
    var j=results[0].status==='fulfilled'?results[0].value:null;
    var n=results[1].status==='fulfilled'?results[1].value:null;
    el.innerHTML=THero('jee',j)+
      '<div style="margin-top:16px">'+
        '<div class="sh" style="margin-top:0"><div class="st">Available Courses</div><div class="sn">2 courses</div></div>'+
        '<div class="cgrid">'+TCC('jee',j)+TCC('neet',n)+'</div>'+
      '</div>';
    // Hero swap
    if(heroTimer) clearInterval(heroTimer);
    var cur='jee';
    heroTimer=setInterval(function(){
      cur=cur==='jee'?'neet':'jee';
      var h=document.querySelector('.hero');
      if(!h){clearInterval(heroTimer);return;}
      h.style.opacity='0';h.style.transition='opacity .45s';
      setTimeout(function(){
        if(document.querySelector('.hero')){
          document.querySelector('.hero').outerHTML=THero(cur,cur==='jee'?j:n);
        }
      },450);
      setTimeout(function(){var nh=document.querySelector('.hero');if(nh){nh.style.opacity='1';}},500);
    },5000);
  }catch(e){
    el.innerHTML=TErr(e.message,'jee');
  }
}

async function renderCourse(tab){
  var el=document.getElementById('app');
  el.innerHTML=TSpinner('Loading '+tab.toUpperCase()+'...');
  if(heroTimer){clearInterval(heroTimer);heroTimer=null;}
  var dUrl=tab==='jee'?URLS.jeeD:URLS.neetD;
  var lUrl=tab==='jee'?URLS.jeeLec:URLS.neetLec;
  try{
    var results=await Promise.allSettled([apiFetch(dUrl),apiFetch(lUrl)]);
    var course=results[0].status==='fulfilled'?results[0].value:null;
    var lraw=results[1].status==='fulfilled'?results[1].value:null;
    var lecs=exLecs(lraw);
    S.lecs=lecs;
    var errHtml=results[1].status==='rejected'?TErr(results[1].reason&&results[1].reason.message?results[1].reason.message:'API error',tab):'';
    var lecsHtml=lecs.length?TLectures(lecs,S.q):'<div class="empty"><div class="emico">📭</div><div class="emtxt">No lectures available yet</div></div>';
    el.innerHTML=THero(tab,course)+TStrip(course)+errHtml+'<div id="LC">'+lecsHtml+'</div>';
    requestAnimationFrame(function(){
      var cards=document.querySelectorAll('.card');
      cards.forEach(function(c,i){c.style.animationDelay=(i*0.033)+'s';});
    });
  }catch(e){
    el.innerHTML=TErr(e.message,tab);
  }
}

function switchTab(tab){
  S.tab=tab;S.q='';document.getElementById('SI').value='';
  document.querySelectorAll('.ntab').forEach(function(t){t.classList.toggle('on',t.dataset.t===tab);});
  document.querySelectorAll('.bn').forEach(function(t){t.classList.toggle('on',t.dataset.t===tab);});
  if(tab==='home') renderHome();
  else if(tab==='jee'||tab==='neet') renderCourse(tab);
  else if(tab==='search') document.getElementById('SI').focus();
}

function toggleCh(hd){
  var body=hd.nextElementSibling;
  hd.classList.toggle('open');
  body.classList.toggle('open');
}

var sTimer=null;
document.getElementById('SI').addEventListener('input',function(e){
  clearTimeout(sTimer);
  S.q=e.target.value.trim();
  sTimer=setTimeout(function(){
    var lc=document.getElementById('LC');
    if(lc&&S.lecs.length){
      lc.innerHTML=TLectures(S.lecs,S.q);
      requestAnimationFrame(function(){
        document.querySelectorAll('.card').forEach(function(c,i){c.style.animationDelay=(i*0.028)+'s';});
      });
    }
  },280);
});

// VIDEO PLAYER
var VP=document.getElementById('VP');
var MOV=document.getElementById('MOV');
var PPB=document.getElementById('PPB');
var PPI=document.getElementById('PPI');
var PFI=document.getElementById('PFI');
var PBUF=document.getElementById('PBUF');
var PRG=document.getElementById('PRG');
var TD=document.getElementById('TD');
var VOL=document.getElementById('VOL');
var SPD=document.getElementById('SPD');
var SPDM=document.getElementById('SPDM');
var VW=document.getElementById('VW');
var CIC=document.getElementById('CIC');
var CICS=document.getElementById('CICS');
var PSV='<polygon points="5,3 19,12 5,21"/>';
var PASV='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';

function openL(i){
  var l=S.lecs[i];if(!l)return;
  var url=getVid(l);
  var title=l.title||l.name||'Lecture';
  var sub=getSub(l)||S.tab.toUpperCase();
  document.getElementById('MS').textContent=sub;
  document.getElementById('MT').textContent=title;
  if(url){VP.src=url;VP.load();VP.play().catch(function(){});}
  else{toast('No video available for this lecture');VP.src='';}
  MOV.classList.add('open');document.body.style.overflow='hidden';
  upPP();
}
function closeP(){
  MOV.classList.remove('open');VP.pause();VP.src='';
  document.body.style.overflow='';SPDM.classList.remove('show');
}
document.getElementById('CM').onclick=closeP;
MOV.addEventListener('click',function(e){if(e.target===MOV)closeP();});

document.getElementById('tap').addEventListener('click',function(){
  if(VP.paused){VP.play();showCIC('play');}else{VP.pause();showCIC('pause');}
  upPP();
});
function showCIC(t){
  CIC.classList.remove('show');void CIC.offsetWidth;
  CICS.innerHTML=t==='play'?PSV:PASV;
  CIC.classList.add('show');
}
PPB.onclick=function(){if(VP.paused)VP.play();else VP.pause();upPP();};
document.getElementById('SBK').onclick=function(){VP.currentTime=Math.max(0,VP.currentTime-10);toast('-10s');};
document.getElementById('SFW').onclick=function(){VP.currentTime=Math.min(VP.duration||0,VP.currentTime+10);toast('+10s');};
VP.addEventListener('play',function(){upPP();VW.classList.remove('paused');});
VP.addEventListener('pause',function(){upPP();VW.classList.add('paused');});
VP.addEventListener('timeupdate',function(){
  if(!VP.duration)return;
  PFI.style.width=((VP.currentTime/VP.duration)*100)+'%';
  TD.textContent=ft(VP.currentTime)+' / '+ft(VP.duration);
});
VP.addEventListener('progress',function(){
  if(VP.buffered.length&&VP.duration)
    PBUF.style.width=((VP.buffered.end(VP.buffered.length-1)/VP.duration)*100)+'%';
});
PRG.addEventListener('click',function(e){
  var r=PRG.getBoundingClientRect();
  VP.currentTime=((e.clientX-r.left)/r.width)*(VP.duration||0);
});
PRG.addEventListener('touchstart',function(e){
  var r=PRG.getBoundingClientRect();
  VP.currentTime=((e.touches[0].clientX-r.left)/r.width)*(VP.duration||0);
},{passive:true});
VOL.oninput=function(e){VP.volume=parseFloat(e.target.value);VP.muted=VP.volume===0;upVol();};
document.getElementById('MUT').onclick=function(){VP.muted=!VP.muted;VOL.value=VP.muted?0:(VP.volume||1);upVol();};
function upVol(){
  var vi=document.getElementById('VI');
  vi.innerHTML=VP.muted||VP.volume===0
    ?'<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>'
    :'<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
}
SPD.addEventListener('click',function(e){e.stopPropagation();SPDM.classList.toggle('show');});
document.querySelectorAll('.so').forEach(function(o){
  o.addEventListener('click',function(){
    var s=parseFloat(o.dataset.s);VP.playbackRate=s;
    SPD.textContent=s+'x';
    document.querySelectorAll('.so').forEach(function(x){x.classList.remove('on');});
    o.classList.add('on');SPDM.classList.remove('show');
  });
});
document.addEventListener('click',function(){SPDM.classList.remove('show');});
document.getElementById('FSB').onclick=function(){
  var m=document.getElementById('MOV');
  if(!document.fullscreenElement)(m.requestFullscreen||m.webkitRequestFullscreen||m.mozRequestFullScreen).call(m);
  else(document.exitFullscreen||document.webkitExitFullscreen).call(document);
};
function upPP(){PPI.innerHTML=VP.paused?PSV:PASV;}
document.addEventListener('keydown',function(e){
  if(!MOV.classList.contains('open'))return;
  if(e.key==='Escape')closeP();
  if(e.key===' '){e.preventDefault();if(VP.paused)VP.play();else VP.pause();upPP();}
  if(e.key==='ArrowLeft')VP.currentTime-=10;
  if(e.key==='ArrowRight')VP.currentTime+=10;
  if(e.key==='f')document.getElementById('FSB').click();
});

// NAV EVENTS
document.querySelectorAll('.ntab,.bn').forEach(function(b){
  b.addEventListener('click',function(){switchTab(b.dataset.t);});
});

// INIT — small delay so fonts load
setTimeout(function(){switchTab('home');},80);
</script>
